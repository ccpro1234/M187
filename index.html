<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>บาคาร่า AI V.1</title>

<style>
body{
  margin:0;
  color:#e2e8f0;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;

  /* 🌌 Base Dark */
  background:#020617;
}

/* 🌈 LAYER 1: Gradient ใหญ่ */
body::after{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 30%, #3b82f6, transparent 40%),
    radial-gradient(circle at 80% 70%, #a855f7, transparent 40%),
    radial-gradient(circle at 50% 50%, #0f172a, #020617 80%);

  background-size:200% 200%;
  animation: bgMove 15s ease infinite;
  z-index:-3;
}

/* ✨ LAYER 2: แสงหมอกลอย */
body::before{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 30% 40%, rgba(255,255,255,0.06), transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.04), transparent 50%);

  animation: fogMove 25s linear infinite;
  z-index:-2;
}

/* 🌟 LAYER 3: ดาวระยิบ */
.bg-stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;

  background:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);

  background-size:80px 80px, 120px 120px;
  background-position:0 0, 40px 40px;

  animation: starMove 60s linear infinite;
}

/* 🔥 LAYER 4: แสงวิ่ง */
.bg-glow{
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  z-index:-1;
  pointer-events:none;

  background:
    conic-gradient(
      from 0deg,
      rgba(59,130,246,0.15),
      rgba(168,85,247,0.15),
      rgba(59,130,246,0.15)
    );

  animation: rotateGlow 20s linear infinite;
}

/* 🌈 Animation ต่างๆ */
@keyframes bgMove{
  0%{ background-position:0% 50%; }
  50%{ background-position:100% 50%; }
  100%{ background-position:0% 50%; }
}

@keyframes fogMove{
  0%{ transform:translate(0,0); }
  100%{ transform:translate(100px,80px); }
}

@keyframes starMove{
  0%{ background-position:0 0, 40px 40px; }
  100%{ background-position:1000px 800px, 1040px 840px; }
}

@keyframes rotateGlow{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

.container{max-width:900px;margin:auto;padding:10px;}

.card{
  background: rgba(30,41,59,0.65);
  backdrop-filter: blur(12px);
  border-radius:16px;
  margin:10px;
  padding:15px;

  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.03);
}

/* BUTTON */
button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:bold;

  background: linear-gradient(135deg,#2563eb,#7c3aed);
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);

  transition: all 0.25s ease;
}

button:hover{
  transform: translateY(-2px) scale(1.05);
  box-shadow:
    0 0 12px #3b82f6,
    0 0 20px #9333ea;
}

button:active{
  transform: scale(0.95);
}

/* BEAD ROAD */
.bead{
 display:grid;
 grid-template-rows:repeat(6,20px);
 grid-auto-flow:column;
 gap:4px;
 justify-content:center;
}

.cell{
 width:20px;height:20px;border-radius:50%;
}
.P{
  background:#3b82f6;
  box-shadow:0 0 8px #3b82f6;
}

.B{
  background:#ef4444;
  box-shadow:0 0 8px #ef4444;
}

.T{
  background:#22c55e;
  box-shadow:0 0 8px #22c55e;
}

/* SIGNAL */
.signal{
 font-size:1.8rem;
 padding:15px;
 border-radius:10px;
}
.play{background:#22c55e;}
.skip{background:#ef4444;}

/* HISTORY */
.history{
 display:grid;
 grid-template-columns:repeat(25,1fr);
 gap:4px;
}

.hcell{height:18px;border-radius:4px;}
.win{background:#22c55e;}
.lose{background:#ef4444;}

.small{font-size:12px;color:#94a3b8;}

body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background:
    radial-gradient(circle, rgba(255,255,255,0.08) 2px, transparent 2px);
  background-size:60px 60px;
  animation: floatLight 25s linear infinite;
  pointer-events:none;
}

@keyframes floatLight{
  0%{ transform:translate(0,0); }
  100%{ transform:translate(60px,60px); }
}

#ai{
  animation: pulseAI 2s infinite;
}

@keyframes pulseAI{
  0%{ opacity:0.6; }
  50%{ opacity:1; }
  100%{ opacity:0.6; }
}

/* 🧠 กล่อง AI */
.ai-card{
  background: linear-gradient(135deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9));
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 0 25px rgba(59,130,246,0.2),
    inset 0 0 15px rgba(255,255,255,0.05);
}

/* 🔥 ตัวแทงหลัก */
.ai-text{
  display:block;
  font-size:2.8rem;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:10px;

  background: linear-gradient(90deg,#38bdf8,#818cf8,#c084fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 10px rgba(59,130,246,0.6),
    0 0 20px rgba(147,51,234,0.4);

  animation: aiGlow 2s ease-in-out infinite;
}

/* ✨ Animation เรืองแสง */
@keyframes aiGlow{
  0%{ transform:scale(1); filter:brightness(1); }
  50%{ transform:scale(1.05); filter:brightness(1.3); }
  100%{ transform:scale(1); filter:brightness(1); }
}

/* 🎯 ผลล่าสุด */
.ai-result{
  font-size:1.2rem;
  font-weight:bold;
  padding:4px 10px;
  border-radius:8px;
}
.ai-result span{
  font-weight:bold;
  font-size:1.3rem;
}

.skip-anim{
  font-size:2.5rem;
  margin-top:10px;
  display:none;
}

/* 💃 เต้น */
.dance{
  display:block;
  animation: danceMove 0.6s infinite;
}

@keyframes danceMove{
  0%{ transform: rotate(0deg) scale(1); }
  25%{ transform: rotate(10deg) scale(1.1); }
  50%{ transform: rotate(-10deg) scale(1.1); }
  75%{ transform: rotate(10deg) scale(1.1); }
  100%{ transform: rotate(0deg) scale(1); }
}

.skip-mode{
  animation: skipFlash 1s infinite;
}

@keyframes skipFlash{
  0%{ box-shadow:0 0 10px #ef4444; }
  50%{ box-shadow:0 0 25px #ef4444; }
  100%{ box-shadow:0 0 10px #ef4444; }
}

.login-page{
  position:fixed;
  inset:0;
  background: radial-gradient(circle,#000,#020617 80%);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.login-box{
  background: rgba(0,0,0,0.85);
  padding:30px;
  border-radius:16px;
  width:280px;

  box-shadow:
    0 0 40px rgba(0,0,0,1),
    0 0 20px rgba(255,255,255,0.05) inset;

  animation: fadeIn 0.8s ease;
}

.login-box h2{
  color:#fff;
  margin-bottom:15px;
}

.login-box input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
}

.login-box button{
  width:100%;
  margin-top:10px;
}

.show-pass{
  font-size:12px;
  color:#aaa;
  text-align:left;
}

.login-msg{
  margin-top:10px;
  color:red;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

.exp-text{
  font-size: 13px;
  color: #e91818;
  opacity: 0.7;
  letter-spacing: 0.5px;
}

.ai-player{
  color:#3b82f6;
  text-shadow:0 0 12px #3b82f6;
}

.ai-banker{
  color:#ef4444;
  text-shadow:0 0 12px #ef4444;
}

.ai-player{ animation: pulseBlue 1.5s infinite; }
.ai-banker{ animation: pulseRed 1.5s infinite; }

@keyframes pulseBlue{
  0%{text-shadow:0 0 5px #3b82f6;}
  50%{text-shadow:0 0 20px #3b82f6;}
  100%{text-shadow:0 0 5px #3b82f6;}
}

@keyframes pulseRed{
  0%{text-shadow:0 0 5px #ef4444;}
  50%{text-shadow:0 0 20px #ef4444;}
  100%{text-shadow:0 0 5px #ef4444;}
}

</style>
</head>

<body>
<div class="bg-stars"></div>
<div class="bg-glow"></div>

  <div id="loginPage" class="login-page">
  <div class="login-box">
    <h2>🔐 LOGIN</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <div class="show-pass">
      <input type="checkbox" onclick="togglePass()"> แสดงรหัสผ่าน
    </div>

    <button onclick="login()">เข้าสู่ระบบ</button>

    <div id="loginMsg" class="login-msg"></div>
  </div>
</div>

<div class="container">

<h2> บอทบาคาร่า AI V.1</h2>

<!-- INPUT -->
<div class="card">
<button onclick="add('P')">ผู้เล่น</button>
<button onclick="add('B')">เจ้ามือ</button>
<button onclick="add('T')">เสมอ</button>
<button onclick="undo()">ย้อน</button>
<button onclick="clearAll()">ล้าง</button>
<br>
📊 P: <span id="countP"></span> |
B: <span id="countB"></span> |
T: <span id="countT"></span> |
Total: <span id="countAll"></span>
</div>

<!-- % -->
<div class="card">
 <span id="percent"></span> |
 ความแม่น: <span id="winrate"></span> |
 ความมั่นใจ: <span id="conf"></span> |
 ⏳ หมดอายุ: <span id="exp" class="exp-text"></span>
</div>

<!-- BEAD -->
<div class="card">
  Bead
<div id="bead" class="bead"></div>
</div>

<!-- AI -->
<div class="card ai-card">
  <span id="ai" class="ai-text"></span><br>
  ผลล่าสุด: <span id="result" class="ai-result"></span>
</div>

<div id="skipAnim" class="skip-anim">💃</div>

<!-- SIGNAL -->
<div class="card">
<div id="signal" class="signal skip">⛔ รอจังหวะ</div>
</div>

<!-- HISTORY -->
<div class="card">

<div id="history" class="history"></div>
<div class="small">ผล ถูก-ผิด</div>
</div>

</div>

<script>
let results=[];
let history=[];
let loss=0,skip=0;
let skipCount = 0;

/* 🔥 วางตรงนี้ */
let dnaMemory = {};


/* INPUT */
function add(x){
 results.push(x);
 check(x);
 update();
}

function undo(){
 results.pop();
 history.pop();
 update();
}

function clearAll(){
 results=[];history=[];
 loss=0;skip=0;
 update();
}

/* BEAD ROAD */
function bead(){
 let el=document.getElementById("bead");
 el.innerHTML='';

 let rows=6;
 let cols=Math.ceil(results.length/rows);

 for(let c=0;c<cols;c++){
  for(let r=0;r<rows;r++){
    let i=c*rows+r;
    let v=results[i];

    let d=document.createElement("div");
    if(v) d.className="cell "+v;
    el.appendChild(d);
  }
 }
}

/* % */
function percent(){
 let p=results.filter(x=>x=='P').length;
 let b=results.filter(x=>x=='B').length;
 let t=results.filter(x=>x=='T').length;

 let total=p+b;
 let pPct= total?(p/total*100).toFixed(0):0;
 let bPct= total?(b/total*100).toFixed(0):0;

 document.getElementById("percent").innerText=
 `P ${pPct}% | B ${bPct}% | T ${t}`;

  document.getElementById("countP").innerText = p;
 document.getElementById("countB").innerText = b;
 document.getElementById("countT").innerText = t;
 document.getElementById("countAll").innerText = results.length;

}

/* ===== AI ===== */
function streak(){
 let c=1;
 for(let i=results.length-1;i>0;i--){
  if(results[i]==results[i-1]) c++;
  else break;
 }
 return c;
}

/* 🔥 ===== วางตรงนี้เลย ===== */

/* ===== DNA LEARN ===== */
function learnDNA(){

 let clean = results.filter(x=>x!='T');

 if(clean.length < 6) return;

 let key = clean.slice(-6, -1).join('');
 let next = clean.at(-1);

 if(!dnaMemory[key]){
   dnaMemory[key] = {P:0, B:0};
 }

 dnaMemory[key][next]++;
}

/* ===== DNA AI ===== */
function dnaAI(){

 let clean = results.filter(x=>x!='T');

 if(clean.length < 5) return null;

 let key = clean.slice(-5).join('');

 let data = dnaMemory[key];

 if(!data) return null;

 return data.P > data.B ? 'P' : 'B';
}



let strategies=[
 {name:'ตามน้ำ', fn:r=>r.at(-1), w:1},
 {name:'สวน', fn:r=>r.at(-1)=='P'?'B':'P', w:1},
 {name:'ต่อไม้', fn:r=>streak()>=2?r.at(-1):'NA', w:1},
 {name:'ตัด2', fn:r=>streak()==2?(r.at(-1)=='P'?'B':'P'):'NA', w:1}
];

/* LEARN */
function learn(){
 if(results.length<2) return;
 let last=results.at(-1);

 strategies.forEach(s=>{
  let pred=s.fn(results.slice(0,-1));
  if(pred=='NA') return;

  if(pred==last) s.w+=0.2;
  else{
    s.w-=0.1;
    if(s.w<0.1) s.w=0.1;
  }
 });
}

/* DECIDE */
function decide(){

 let score = {P:0, B:0};

 let clean = results.filter(x=>x!='T');
 if(clean.length < 4) return null;

 let last = clean.at(-1);

 /* ===== 1. TREND ===== */
 let pCount = clean.filter(x=>x=='P').length;
 let bCount = clean.filter(x=>x=='B').length;

 if(pCount > bCount) score.P += 2;
 if(bCount > pCount) score.B += 2;

 /* 🔥 BIAS โต๊ะ */
if(Math.abs(pCount - bCount) >= 3){
  if(pCount > bCount) score.P += 2;
  else score.B += 2;
}

 /* ===== 2. MOMENTUM ===== */
 let last3 = clean.slice(-3);
 last3.forEach((r,i)=>{
   let w = i+1; // ตัวหลังหนักกว่า
   if(r=='P') score.P += w;
   if(r=='B') score.B += w;
 });

 /* ===== 3. CHOP (ปิงปอง) ===== */
 let pattern = clean.slice(-6).join('');

 if(/PBPBPB|BPBPBP/.test(pattern)){
   // ปิงปอง → เล่นสวน
   if(last=='P') score.B += 3;
   if(last=='B') score.P += 3;
 }

 /* ===== 4. STREAK ===== */
 let s = streak();

 if(s>=3){
   if(last=='P') score.P += 3;
   if(last=='B') score.B += 3;
 }

 /* ===== 5. STRATEGY เดิม ===== */
 strategies.forEach(s=>{
   let bet = s.fn(results);
   if(bet=='P') score.P += s.w;
   if(bet=='B') score.B += s.w;
 });

 /* ===== DECISION ===== */
 let bet = score.P > score.B ? 'P' : 'B';

 return {
   name:'AI อัจฉริยะ',
   bet:bet,
   score: Math.max(score.P, score.B)
 };
}

/* CONF */
function conf(best){
 if(!best) return 0;

 let total = best.score;
 return Math.min(95, total * 5); // scale ให้ดูฉลาด
}


/* CHECK */
function check(real){

 // 🔥 ถ้าเสมอ → ไม่ต้องคิดผล
 if(real === 'T') return;

 if(history.length==0) return;

 let prev = history.at(-1);

 if(prev && prev.bet){
   prev.win = prev.bet == real;

   if(prev.win) loss = 0;
   else loss++;
 }
}

/* HISTORY */
function renderHistory(){
 let el=document.getElementById("history");
 el.innerHTML='';

 history.forEach(h=>{
  let d=document.createElement("div");
  if(h.win===true) d.className="hcell win";
  else if(h.win===false) d.className="hcell lose";
  else d.className="hcell";
  el.appendChild(d);
 });
}

/* UPDATE */
function update(){

 bead();
 percent();
 learn();
 learnDNA(); // 🔥 อย่าลืมให้ AI เรียน DNA

 let best = results.length>=3 ? decide() : null;
 let c = conf(best);

 let signal = 'SKIP';

 /* ===== SMART PLAY ===== */
 if(skip > 0){
  skip--;
 }else if(best){

  if(c >= 70){
    signal = best.bet; // 🔥 มั่นใจสูง
  }
  else if(c >= 50){
    signal = best.bet; // ⚖️ กลาง ก็ยังเล่น
  }
  else if(c >= 40){
    let last = results.at(-1);
    if(last) signal = last; // 🧠 fallback ตามน้ำ
  }
  else{
    signal = 'SKIP';
  }
 }

 /* ===== ANTI LOSS (ฉลาดขึ้น) ===== */
 if(loss >= 4){
  skip = 1;
  signal = 'SKIP';
 }

 /* ===== กันข้ามบ่อยเกิน ===== */
 if(signal == 'SKIP'){
  skipCount++;
 }else{
  skipCount = 0;
 }

 // 🔥 ถ้าข้ามติด 3 ครั้ง → บังคับเล่น
 if(skipCount >= 3 && best){
  signal = best.bet;
 }

 /* ===== SAVE HISTORY ===== */
 if(best){
  history.push({bet:best.bet});
 }


/* ===== UI ===== */
let elAI = document.getElementById("ai");
let anim = document.getElementById("skipAnim");
let card = document.querySelector(".ai-card");

if(signal === 'SKIP'){
  elAI.innerHTML = "💃 WAITING...";
  elAI.className = "ai-text";
  anim.classList.add("dance");
  card.classList.add("skip-mode");

}else{

  anim.classList.remove("dance");
  card.classList.remove("skip-mode");

  if(best){
    if(best.bet === 'P'){
      elAI.innerHTML = "🔵 PLAYER";
      elAI.className = "ai-text ai-player";
    }else{
      elAI.innerHTML = "🔴 BANKER";
      elAI.className = "ai-text ai-banker";
    }
  }else{
    elAI.innerHTML = "-";
    elAI.className = "ai-text";
  }

}


 document.getElementById("conf").innerText =
 c.toFixed(0)+"%";

 let plays = history.filter(x=>x.win!==undefined);
 let win = plays.filter(x=>x.win).length;
 let pct = plays.length?(win/plays.length*100).toFixed(0):0;

 document.getElementById("winrate").innerText = pct+"%";

 let last = history.at(-1);
 if(last && last.win!==undefined){
  document.getElementById("result").innerHTML =
   last.win
   ? "<span style='color:#22c55e'>✔ ถูก</span>"
   : "<span style='color:#ef4444'>✖ ผิด</span>";
 }

 let el = document.getElementById("signal");

 if(signal=='P'){
  el.className="signal play";
  el.innerText="▶ แทง ผู้เล่น";
 }else if(signal=='B'){
  el.className="signal play";
  el.innerText="▶ แทง เจ้ามือ";
 }else{
  el.className="signal skip";
  el.innerText="⛔ ข้าม";
 }

 let expDate = new Date("2026-04-01");
let now = new Date();

document.getElementById("exp").innerText = "1 เม.ย. 2569";
  expDate.toLocaleDateString("th-TH");

if(now > expDate){
  document.getElementById("ai").innerHTML = "❌ หมดอายุ";
  document.getElementById("signal").innerText = "⛔ ใช้งานไม่ได้";
}

 renderHistory();
}

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "1234" && p === "1234"){
    document.getElementById("loginPage").style.display = "none";
  }else{
    document.getElementById("loginMsg").innerText = "❌ รหัสไม่ถูกต้อง";
  }
}

function togglePass(){
  let pass = document.getElementById("pass");
  pass.type = pass.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
